<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Today’s Recommendation</title>

  <style>
    :root{
      --black:#111111;
      --gray:#494949;
      --body:#222222;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      min-height:100%;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--black);
    }

    body{
      background:#ffffff;
      transition:background-color .45s ease;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .top{
      padding:28px 30px 0;
    }

    .home-link{
      display:inline-flex;
      width:42px;
      height:42px;
      align-items:center;
      justify-content:center;
    }

    .home-link img{
      width:34px;
      height:34px;
      object-fit:contain;
    }

    .wrap{
      min-height:calc(100vh - 70px);
      display:grid;
      grid-template-columns:1.2fr 0.8fr;
      padding:26px 60px 40px;
      position:relative;
    }

    .text{
      padding-top:26px;
    }

    .eyebrow{
      margin:0 0 22px;
      color:var(--gray);
      font-size:20px;
    }

    .title{
      margin:0;
      font-size:clamp(130px, 10vw, 200px);
      line-height:.85;
      letter-spacing:-0.1em;
      font-weight:700;
    }

    .desc{
      margin:48px 0 0;
      color:var(--body);
      font-size:28px;
      line-height:1.5;
      letter-spacing:-0.02em;
      max-width:900px;
    }

    .selected{
      margin-top:40px;
    }

    .selected-title{
      margin:0 0 10px;
      color:var(--gray);
      font-size:20px;
    }

    .selected-list{
      margin:0;
      max-width:900px;
      color:var(--body);
      font-size:22px;
      line-height:1.4;
      letter-spacing:-0.02em;
    }

    .image-box{
      position:absolute;
      right:60px;
      bottom:40px;
      width:420px;
      height:420px;
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
    }

    .fruit-image{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    @media (max-width:1100px){

      .wrap{
        grid-template-columns:1fr;
      }

      .image-box{
        position:relative;
        right:auto;
        bottom:auto;
        margin-top:40px;
        width:360px;
        height:360px;
      }
    }

    @media (max-width:768px){

      .top{
        padding:20px;
      }

      .wrap{
        padding:20px;
      }

      .title{
        font-size:clamp(64px, 16vw, 110px);
      }

      .desc{
        font-size:22px;
      }

      .selected-list{
        font-size:18px;
      }

      .image-box{
        width:300px;
        height:300px;
      }
    }
  </style>
</head>

<body>

  <header class="top">
    <a href="index.html" class="home-link">
      <img src="Home.png" alt="Home">
    </a>
  </header>

  <main class="wrap">

    <section class="text">

      <p class="eyebrow">
        Today's recommendation
      </p>

      <h1 class="title" id="fruitName">
        Banana
      </h1>

      <p class="desc" id="fruitDesc">
        Bananas provide natural sugars and potassium.
      </p>

      <div class="selected">

        <p class="selected-title">
          Selected conditions
        </p>

        <p class="selected-list" id="selectedList">
          tired, low energy
        </p>

      </div>

    </section>

    <div class="image-box">
      <img
        id="fruitImage"
        class="fruit-image"
        src="Banana.png"
        alt="fruit"
      >
    </div>

  </main>

  <script src="result.js"></script>

</body>
</html>
